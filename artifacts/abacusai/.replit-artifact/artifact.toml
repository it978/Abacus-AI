kind = "web"
previewPath = "/"
title = "AbacusAI"
version = "1.0.0"
id = "artifacts/abacusai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25767

[services.development]
run = "pnpm --filter @workspace/abacusai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/abacusai", "run", "build" ]
publicDir = "artifacts/abacusai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25767"
BASE_PATH = "/"
